{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0"><i class="bi bi-arrow-left-right me-2"></i>Nova Antecipação de Recebíveis</h5>
      </div>
      <div class="card-body">
        <p class="small text-muted mb-3">
          A antecipação será encaminhada pela esteira de crédito para aprovação antes da liberação.
        </p>

        <form method="post">
          {% csrf_token %}
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Cliente</label>
              <select name="cliente" class="form-select" required>
                <option value="">Selecione...</option>
                {% for c in clientes %}
                <option value="{{ c.id }}">{{ c.nome_completo }} ({{ c.cpf }})</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Tipo de Recebíveis</label>
              <select name="tipo_recebiveis" class="form-select" required>
                <option value="CHEQUES">Cheques</option>
                <option value="DUPLICATAS">Duplicatas / NFs</option>
                <option value="CARTAO">Recebíveis de Cartão</option>
                <option value="CONTRATOS">Contratos</option>
                <option value="OUTRO">Outros</option>
              </select>
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Valor a Antecipar (R$)</label>
              <input type="text" name="valor" class="form-control antec-brl" required placeholder="0,00">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Taxa (% a.m.)</label>
              <input type="number" name="taxa" class="form-control" step="0.01" required value="3.00">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Nº Parcelas</label>
              <input type="number" name="qtd_parcelas" class="form-control" value="1" min="1" max="360" required>
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">1º Vencimento</label>
              <input type="date" name="vencimento" class="form-control" required>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold">Observações</label>
              <input type="text" name="observacoes" class="form-control" placeholder="Detalhes dos recebíveis...">
            </div>
          </div>

          <div class="d-flex justify-content-between">
            <a href="{% url 'emprestimos:painel_esteira' %}" class="btn btn-outline-secondary">Voltar</a>
            <button type="submit" class="btn btn-info"><i class="bi bi-check-lg me-1"></i>Criar Proposta de Antecipação</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
document.querySelectorAll('.antec-brl').forEach(function(el){
  el.addEventListener('input', function(){
    var v = el.value.replace(/\D/g, '');
    if(!v){ el.value = ''; return; }
    var n = parseInt(v,10), r = (n/100).toFixed(2), p = r.split('.');
    p[0] = p[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    el.value = p.join(',');
  });
  el.addEventListener('keypress', function(e){ if(!/[0-9]/.test(String.fromCharCode(e.which))) e.preventDefault(); });
});
</script>
{% endblock %}
