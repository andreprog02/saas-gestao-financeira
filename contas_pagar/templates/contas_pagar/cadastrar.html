{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Cadastrar Conta a Pagar</h5>
      </div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Nome / Descrição da Conta</label>
            <input type="text" name="descricao" class="form-control"
                   placeholder="Ex: Conta de Luz — Junho/2026" required>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Tipo de Despesa</label>
              <select name="tipo_despesa" class="form-select" required>
                {% for val, label in tipos %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Valor (R$)</label>
              <input type="text" name="valor" class="form-control" id="valor-brl"
                     placeholder="0,00" required inputmode="decimal">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Vencimento</label>
              <input type="date" name="vencimento" class="form-control" required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Fatura / Boleto (PDF ou imagem)</label>
            <input type="file" name="fatura" class="form-control"
                   accept=".pdf,.jpg,.jpeg,.png">
            <div class="form-text">Opcional. Faça upload da fatura ou boleto para visualização na aprovação.</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Observações</label>
            <textarea name="observacoes" class="form-control" rows="2"
                      placeholder="Informações adicionais..."></textarea>
          </div>

          <div class="d-flex justify-content-between">
            <a href="{% url 'contas_pagar:painel' %}" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1"></i>Voltar
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-send me-1"></i>Enviar para Aprovação
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var el = document.getElementById('valor-brl');
  if(!el) return;

  el.addEventListener('input', function(e){
    var v = el.value.replace(/\D/g, '');
    if(v === '') { el.value = ''; return; }

    // Converte centavos para reais
    var num = parseInt(v, 10);
    var reais = (num / 100).toFixed(2);

    // Formata: 1.234,56
    var parts = reais.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    el.value = parts.join(',');
  });

  // Impede caracteres não numéricos
  el.addEventListener('keypress', function(e){
    if(!/[0-9]/.test(String.fromCharCode(e.which))) e.preventDefault();
  });
})();
</script>
{% endblock %}
