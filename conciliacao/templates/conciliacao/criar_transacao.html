{% extends "base.html" %}
{% load humanize %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">

    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Criar Transação</h5>
      </div>
      <div class="card-body">

        <div class="alert alert-info py-2 small">
          <strong>Lançamento do extrato:</strong><br>
          {{ lancamento.data|date:"d/m/Y" }} ·
          <strong class="{% if lancamento.is_credito %}text-success{% else %}text-danger{% endif %}">
            R$ {{ lancamento.valor_absoluto|floatformat:2 }}
          </strong> ·
          {{ lancamento.descricao }}
        </div>

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label fw-semibold">Tipo da Transação</label>
            <select name="tipo" class="form-select" required>
              {% for value, label in tipos %}
              <option value="{{ value }}">{{ label }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Descrição</label>
            <input type="text" name="descricao" class="form-control" value="{{ lancamento.descricao }}" required>
          </div>

          <div class="d-flex justify-content-between">
            <a href="{% url 'conciliacao:detalhe_extrato' lancamento.extrato_id %}" class="btn btn-outline-secondary">
              Voltar
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Criar e Conciliar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
