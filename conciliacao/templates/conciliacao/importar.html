{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0"><i class="bi bi-upload me-2"></i>Importar Extrato Bancário</h5>
      </div>
      <div class="card-body">

        {% if not contas %}
        <div class="alert alert-warning">
          <i class="bi bi-exclamation-triangle me-1"></i>
          Nenhuma conta bancária cadastrada. <a href="{% url 'conciliacao:criar_conta' %}">Crie uma primeiro</a>.
        </div>
        {% else %}

        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Conta Bancária</label>
              <select name="conta_id" class="form-select" required>
                <option value="">Selecione...</option>
                {% for c in contas %}
                <option value="{{ c.id }}">{{ c.nome }} ({{ c.get_banco_display }})</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Arquivo (.ofx ou .csv)</label>
              <input type="file" name="arquivo" class="form-control" accept=".ofx,.csv" required
                     id="arquivo-input">
            </div>
          </div>

          <!-- CONFIG CSV (aparece só quando o arquivo é .csv) -->
          <div id="csv-config" style="display: none;">
            <div class="alert alert-info py-2 small">
              <i class="bi bi-info-circle me-1"></i>
              Configure as colunas do seu CSV. As colunas são numeradas a partir de 0.
            </div>
            <div class="row mb-3">
              <div class="col-md-3">
                <label class="form-label small fw-semibold">Coluna Data</label>
                <input type="number" name="col_data" class="form-control form-control-sm" value="0" min="0">
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-semibold">Coluna Descrição</label>
                <input type="number" name="col_descricao" class="form-control form-control-sm" value="1" min="0">
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-semibold">Coluna Valor</label>
                <input type="number" name="col_valor" class="form-control form-control-sm" value="2" min="0">
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-semibold">Coluna Doc (ou -1)</label>
                <input type="number" name="col_documento" class="form-control form-control-sm" value="-1" min="-1">
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-md-4">
                <label class="form-label small fw-semibold">Formato da Data</label>
                <select name="formato_data" class="form-select form-select-sm">
                  <option value="%d/%m/%Y">dd/mm/aaaa</option>
                  <option value="%Y-%m-%d">aaaa-mm-dd</option>
                  <option value="%d-%m-%Y">dd-mm-aaaa</option>
                  <option value="%m/%d/%Y">mm/dd/aaaa</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label small fw-semibold">Separador</label>
                <select name="separador" class="form-select form-select-sm">
                  <option value=";">Ponto e vírgula (;)</option>
                  <option value=",">Vírgula (,)</option>
                  <option value="	">Tab</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label small fw-semibold">Linhas de Cabeçalho</label>
                <input type="number" name="pular_linhas" class="form-control form-control-sm" value="1" min="0">
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-between">
            <a href="{% url 'conciliacao:dashboard' %}" class="btn btn-outline-secondary">Voltar</a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-cloud-upload me-1"></i>Importar e Conciliar
            </button>
          </div>
        </form>

        {% endif %}
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('arquivo-input').addEventListener('change', function() {
    var csvConfig = document.getElementById('csv-config');
    csvConfig.style.display = this.value.toLowerCase().endsWith('.csv') ? 'block' : 'none';
  });
</script>
{% endblock %}
